<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E73838"/>
      <stop offset="55%" stop-color="#E73838"/>
      <stop offset="100%" stop-color="#A12727"/>
    </linearGradient>
    <filter id="rGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="44" ry="44" fill="url(#rGrad)"/>

  <text
    x="100" y="102"
    font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
    font-size="138"
    font-weight="bold"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="central"
    filter="url(#rGlow)"
  >R</text>
</svg>
