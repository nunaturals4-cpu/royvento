kind = "web"
previewPath = "/"
title = "Royvento — Event Management Platform"
version = "1.0.0"
id = "artifacts/royvento"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24586

[services.development]
run = "pnpm --filter @workspace/royvento run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/royvento", "run", "build" ]
publicDir = "artifacts/royvento/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24586"
BASE_PATH = "/"
