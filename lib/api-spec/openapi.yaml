      operationId: getSeoPage
      tags: [seo]
      summary: Fetch admin-editable editorial copy for a programmatic SEO landing page
      description: |
        Returns the SEO page row for a (template, citySlug, secondSlug) tuple if
        an admin has overridden the default programmatic intro/FAQ. 404 when
        nothing is stored — frontend falls back to its built-in template copy.
      parameters:
        - name: template
          in: query
          required: true
          schema:
            type: string
            enum: [city, locality, category]
        - name: citySlug
          in: query
          required: true
          schema:
            type: string
        - name: secondSlug
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Stored editorial copy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeoPage"
        "404":
          description: No override stored
    put:
      operationId: upsertSeoPage
      tags: [seo, admin]
      summary: Upsert admin-editable editorial copy for a landing page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertSeoPageBody"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeoPage"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /cities/{citySlug}/summary:
    get:
      operationId: getCitySummary
      tags: [seo]
      summary: Aggregated counts for a city landing page
      description: |
        Returns the vendor count, top vendors, locality counts, and category
        counts for the given city slug. Used by /:city programmatic landing
        pages so the page can render link rails and JSON-LD without N+1 calls.
      parameters:
        - name: citySlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: City aggregation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitySummary"

  /cities/{citySlug}/localities/{localitySlug}:
    get:
      operationId: getLocalitySummary
      tags: [seo]
      summary: Aggregated pubs for a city/locality landing page
      parameters:
        - name: citySlug
          in: path
          required: true
          schema:
            type: string
        - name: localitySlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Locality aggregation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalitySummary"

  /cities/{citySlug}/categories/{categorySlug}:
    get:
      operationId: getCategorySummary
      tags: [seo]
      summary: Aggregated pubs for a city/category landing page
      parameters:
        - name: citySlug
          in: path
          required: true
          schema:
            type: string
        - name: categorySlug
          in: path
          required: true
          schema:
            type: string
            enum: [rooftop, microbrewery, sports-bar, live-music, couple-friendly, lounge, club, pubs]
      responses:
        "200":
          description: Category aggregation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategorySummary"

