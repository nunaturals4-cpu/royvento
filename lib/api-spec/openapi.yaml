    PartnerAnalyticsResult:
      type: object
      properties:
        totalEarnings:
          type: number
        monthEarnings:
          type: number
        codRevenue:
          type: number
        onlineRevenue:
          type: number
        actualCodRevenue:
          type: number
          description: Total cash actually expected at the door for COD bookings, computed from per-type actual entry counts.
        actualCodRecordedCount:
          type: integer
          description: Number of COD bookings that have actual entry recorded.
        pendingActualsCount:
          type: integer
          description: COD confirmed/completed bookings still missing actual entry counts. These contribute ₹0 to totalEarnings until actuals are recorded.
        grossEarnings:
          type: number
        netEarnings:
          type: number
        totalCommission:
          type: number
        codCommission:
          type: number
        onlineCommission:
          type: number
        commissionRates:
          $ref: "#/components/schemas/PartnerCommissionRates"
        commissionSummary:
          type: object
          properties:
            freeEntry:
              $ref: "#/components/schemas/CommissionTypeSummary"
            ticket:
              $ref: "#/components/schemas/CommissionTypeSummary"
            table:
              $ref: "#/components/schemas/CommissionTypeSummary"
          required: [freeEntry, ticket, table]
        totalWomen:
          type: integer
        totalMen:
          type: integer
        totalCouple:
          type: integer
        perEvent:
          type: array
          items:
            type: object
            properties:
              eventId:
                type: integer
              eventTitle:
                type: string
              bookingCount:
                type: integer
              revenue:
                type: number
            required: [eventId, eventTitle, bookingCount, revenue]
        dailyRevenue:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              revenue:
                type: number
            required: [date, revenue]
        dailyCommission:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              commission:
                type: number
            required: [date, commission]
      required: [totalEarnings, monthEarnings, codRevenue, onlineRevenue, grossEarnings, netEarnings, totalCommission, codCommission, onlineCommission, commissionRates, commissionSummary, totalWomen, totalMen, totalCouple, perEvent, dailyRevenue, dailyCommission]

    ScanTicketBody:
      type: object
      properties:
        code:
          type: string
        confirm:
          type: boolean
          description: When true, marks the booking as checked in. When false/omitted (and no actualEntry is provided), the request is treated as a read-only lookup that returns booking details + status without burning the ticket. The mobile scanner uses this two-step flow so the manager must explicitly tap "Confirm entry" before a ticket is consumed.
        actualEntry:
          type: object
          description: Optional per-type actual attendance recorded by the scanner. When provided, updates the booking's actual_* columns, returns the recomputed actualAmountDue, AND implicitly confirms the check-in (no separate confirm flag needed).
          properties:
            women:
              type: integer
            men:
              type: integer
            couple:
              type: integer
            guests:
              type: integer
      required: [code]

    ScanTicketBooking:
      type: object
      properties:
        id:
          type: integer
        eventTitle:
          type: string
        vendorName:
          type: string
        bookingDate:
          type: string
        personName:
          type: string
          nullable: true
        userName:
          type: string
        pubMode:
          type: string
        ticketWomen:
          type: integer
        ticketMen:
          type: integer
        ticketCouple:
          type: integer
        guests:
          type: integer
        finalPrice:
          type: number
        commissionRate:
          type: number
          description: Flat fee in INR per unit (per person, per ticket, or per table booking)
        commissionAmount:
          type: number
          description: Platform fee deducted from gross
        netAmount:
          type: number
          description: Net amount the venue should collect
        paymentMethod:
          type: string
        finalPriceBooked:
          type: number
          description: Original booked finalPrice (alias for finalPrice)
        actualWomen:
          type: integer
          nullable: true
        actualMen:
          type: integer
          nullable: true
        actualCouple:
          type: integer
          nullable: true
        actualGuests:
          type: integer
          nullable: true
        actualAmountDue:
          type: number
          nullable: true
          description: Server-computed amount the venue should collect at the door, based on per-type actuals. Null if no actuals recorded yet.
        actualEntry:
          type: object
          nullable: true
          description: Per-type actuals as a single object. Null if none recorded yet.
          properties:
            women:
              type: integer
              nullable: true
            men:
              type: integer
              nullable: true
            couple:
              type: integer
              nullable: true
            guests:
              type: integer
              nullable: true
        priceWomen:
          type: number
          description: Per-woman ticket price for this event (used by client to compute live actual amount).
        priceMen:
          type: number
          description: Per-man ticket price for this event.
        priceCouple:
          type: number
          description: Per-couple ticket price for this event.
      required: [id, eventTitle, vendorName, bookingDate, userName, pubMode, ticketWomen, ticketMen, ticketCouple, guests]

    ScanTicketResult:
      type: object
      properties:
        code:
          type: string
          enum: [OK, ALREADY_CHECKED_IN, ALREADY_CHECKED_OUT, NOT_FOUND, INVALID_STATUS]
        status:
          type: string
          description: Higher-resolution outcome. `ready_to_check_in` is only returned for lookup-only requests on a non-checked-in booking. `checked_in` is returned when a confirm/actualEntry request just burned the ticket. `already_checked_in` is returned for re-scans of an inside guest. `already_checked_out` is returned when the booking has already been checked out — the scanner UI surfaces this as a distinct "Checked out" state and offers re-check-in via a fresh confirm flow.
          enum: [ready_to_check_in, checked_in, already_checked_in, already_checked_out]
        checkedOutAt:
          type: string
          nullable: true
        lookupOnly:
          type: boolean
          description: "True when the response came from a read-only lookup (no `confirm` and no `actualEntry`). The booking has NOT been marked checked in. The client should render a \"Confirm entry\" affordance that re-POSTs with `confirm: true`."
        justCheckedIn:
          type: boolean
          description: True only when this exact request transitioned the booking from not-checked-in to checked-in. False when the booking was already checked in (whether inside the grace window or not).
        recentlyCheckedIn:
          type: boolean
          description: True when a confirm/actualEntry request landed on an already-checked-in booking but within the ~30s grace window. The server returns 200 OK instead of 409 so duplicate scans (camera double-fire, fast retap) don't surface as errors to the manager.
        message:
          type: string
        checkedInAt:
          type: string
          nullable: true
        booking:
          $ref: "#/components/schemas/ScanTicketBooking"
          nullable: true
      required: [code]

    CheckoutTicketBody:
      type: object
      description: Identify the booking either by `bookingId` (preferred, used by the scanner table) or by a scanned ticket string (`ticketCode`, alias `code`). Exactly one of the three should be provided.
      properties:
        bookingId:
          type: integer
          description: Numeric booking id. Preferred when checking out from a known list (e.g. the partner scanner table) since it skips ticket-code parsing.
        ticketCode:
          type: string
          description: Full ticket code as printed on the QR (e.g. `ROY-000123-AB`). Used when the operator scans / types the code.
        code:
          type: string
          description: Alias for `ticketCode` (kept for backward compatibility).
        confirm:
          type: boolean
          description: When true, marks the booking as checked out. When false/omitted, returns booking details + status without mutating (mirror of scan-ticket lookup).

    CheckoutTicketResult:
      type: object
      properties:
        code:
          type: string
          enum: [OK, ALREADY_CHECKED_OUT, NOT_CHECKED_IN, NOT_FOUND, INVALID_CODE, FORBIDDEN, WRONG_VENDOR, INVALID_STATUS]
        status:
          type: string
          enum: [ready_to_check_out, checked_out, already_checked_out, not_checked_in]
        lookupOnly:
          type: boolean
        justCheckedOut:
          type: boolean
        message:
          type: string
        checkedInAt:
          type: string
          nullable: true
        checkedOutAt:
          type: string
          nullable: true
        booking:
          $ref: "#/components/schemas/ScanTicketBooking"
          nullable: true
        occupancy:
          $ref: "#/components/schemas/OccupancyRow"
          nullable: true
          description: Live occupancy snapshot for the booking's vendor immediately after the check-out. Returned on successful confirm so the client can refresh capacity badges without a follow-up request.
      required: [code]

    ScannerBookingRow:
      type: object
      properties:
        id: { type: integer }
        ticketCode: { type: string }
        eventId: { type: integer }
        eventTitle: { type: string }
        vendorId: { type: integer }
        vendorName: { type: string }
        bookingDate: { type: string }
        bookingTime: { type: string, nullable: true }
        personName: { type: string, nullable: true }
        userName: { type: string }
        userEmail: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        pubMode: { type: string }
        guests: { type: integer }
        ticketWomen: { type: integer }
        ticketMen: { type: integer }
        ticketCouple: { type: integer }
        finalPrice: { type: number }
        paymentMethod: { type: string }
        status: { type: string }
        checkedIn: { type: boolean }
        checkedInAt: { type: string, nullable: true }
        checkedOut: { type: boolean }
        checkedOutAt: { type: string, nullable: true }
        actualGuests: { type: integer, nullable: true }
        actualWomen: { type: integer, nullable: true }
        actualMen: { type: integer, nullable: true }
        actualCouple: { type: integer, nullable: true }
        liveStatus:
          type: string
          description: |
            Derived live status used by the scanner table & filter chips:
            - `notArrived`: confirmed booking, not yet checked in (today or future).
            - `inside`: checked in, not yet checked out.
            - `checkedOut`: checked out.
            - `noShow`: confirmed booking, never checked in, bookingDate is in the past.
            - `cancelled`: booking row with status=cancelled (kept visible for audit).
          enum: [notArrived, inside, checkedOut, noShow, cancelled]
      required: [id, ticketCode, eventId, eventTitle, vendorId, vendorName, bookingDate, userName, pubMode, guests, ticketWomen, ticketMen, ticketCouple, status, checkedIn, checkedOut, liveStatus]

    ScannerBookingsResponse:
      type: object
      properties:
        rows:
          type: array
          items: { $ref: "#/components/schemas/ScannerBookingRow" }
        page: { type: integer }
        totalPages: { type: integer }
        total: { type: integer }
        stats:
          type: object
          properties:
            total: { type: integer }
            notArrived: { type: integer }
            inside: { type: integer }
            checkedOut: { type: integer }
            noShow: { type: integer }
            cancelled: { type: integer }
            currentlyInside: { type: integer }
          required: [total, notArrived, inside, checkedOut, noShow, cancelled, currentlyInside]
      required: [rows, page, totalPages, total, stats]

    OccupancyRow:
      type: object
      properties:
        vendorId: { type: integer }
        businessName: { type: string }
        city: { type: string, nullable: true }
        capacity: { type: integer }
        currentlyInside: { type: integer }
        available: { type: integer }
        occupancyPercent: { type: number }
        totalBookingsToday: { type: integer }
        checkedInCount: { type: integer }
        checkedOutCount: { type: integer }
        notArrivedCount: { type: integer }
        lastScanAt:
          type: string
          nullable: true
          description: ISO timestamp of the most recent scan (check-in or check-out) at this venue today. Null when no scans yet.
        today: { type: string }
      required: [vendorId, businessName, capacity, currentlyInside, available, occupancyPercent, totalBookingsToday, checkedInCount, checkedOutCount, notArrivedCount, today]

    OccupancyResponse:
