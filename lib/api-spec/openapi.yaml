          type: number
        totalCommission:
          type: number
          description: Platform commission realised in the date window. Sourced directly from `commission_ledger` (triggers `online_payment`, `cod_checkin`, `free_checkin`) — same number the Commissions tab shows as `totals.collectedCommission`. Online bookings earn at payment, COD at check-in (capped by actual cash collected), free-entry at check-in (`freeEntryRate × heads`).
        codRevenue:
          type: number
        actualCodRevenue:
          type: number
          description: Sum of actual cash collected at the door for COD bookings (per-type entry counts × event prices for ticket mode, pro-rated finalPrice otherwise).
        actualCodRecordedCount:
          type: integer
          description: Number of COD bookings that have actual entry counts recorded.
        pendingActualsCount:
          type: integer
          description: COD confirmed/completed bookings still missing actual entry counts. These contribute ₹0 to totalRevenue until actuals are recorded.
        onlineRevenue:
          type: number
        actualWomen:
          type: integer
          description: Sum of `actualWomen` across all confirmed/completed bookings in the date window — i.e. women actually checked in at the door.
        actualMen:
          type: integer
          description: Sum of `actualMen` across all confirmed/completed bookings in the date window.
        actualCouple:
          type: integer
          description: Sum of `actualCouple` across all confirmed/completed bookings in the date window.
        actualsRecordedCount:
          type: integer
          description: Number of confirmed/completed bookings in the window that have ANY actuals recorded (women / men / couple / guests).
        actualsEligibleCount:
          type: integer
          description: Total confirmed/completed bookings in the window (denominator for the "X of Y bookings recorded" completeness hint).
