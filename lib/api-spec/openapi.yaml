components:
  schemas:
    FreeEntryRules:
      type: object
      properties:
        enabled:
          type: boolean
        genders:
          type: array
          items:
            type: string
            enum: [Everyone, Ladies, Men, Couples]
        days:
          type: array
          items:
            type: string
            enum: [Mon, Tue, Wed, Thu, Fri, Sat, Sun]
        beforeTime:
          type: string
          description: "Entry cutoff time in 24-hour HH:mm format, e.g. 22:00"
      required: [enabled, genders, days]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Ok:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    Role:
      type: string
      enum: [user, vendor, admin]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        phone:
          type: string
        about:
          type: string
        profileImage:
          type: string
        referralCode:
          type: string
        referredBy:
          type: integer
          nullable: true
        points:
          type: integer
        createdAt:
          type: string
      required: [id, email, name, role, phone, about, profileImage, referralCode, points, createdAt]

    RegisterBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 6
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
      required: [email, password, name]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    MeResponse:
      type: object
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/User"
            - type: "null"
      required: [user]

    UpdateRoleBody:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/Role"
      required: [role]

    UpdateMeBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        phone:
          type: string
          maxLength: 50
        about:
          type: string
          maxLength: 2000
        profileImage:
          type: string
          maxLength: 2048

    VendorStatus:
      type: string
      enum: [pending, approved, rejected]

    Vendor:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        businessName:
          type: string
        category:
          type: string
        description:
          type: string
        location:
          type: string
        bannerImage:
          type: string
        coverImageUrl:
          type: string
        portfolioImages:
          type: array
          items:
            type: string
        status:
          $ref: "#/components/schemas/VendorStatus"
        rating:
          type: number
        reviewCount:
          type: integer
        createdAt:
          type: string
        openDays:
          type: array
          items:
            type: string
        address:
          type: string
          nullable: true
        dayHours:
          type: object
          nullable: true
        city:
          type: string
        state:
          type: string
        country:
          type: string
        freeEntryRules:
          anyOf:
            - $ref: "#/components/schemas/FreeEntryRules"
            - type: "null"
        danceFloor:
          type: string
          enum: [dedicated, general, none]
          nullable: true
        danceFloorPhotos:
          type: array
          items:
            type: string
          nullable: true
        menuUrl:
          type: string
        crowdLevel:
          type: string
          enum: [low, moderate, party]
          nullable: true
      required: [id, userId, businessName, category, description, location, bannerImage, coverImageUrl, portfolioImages, status, rating, reviewCount, createdAt, openDays, city, state, country]

    MyVendorResponse:
      type: object
      properties:
        vendor:
          oneOf:
            - $ref: "#/components/schemas/Vendor"
            - type: "null"
      required: [vendor]

    CreateVendorBody:
      type: object
      properties:
        businessName:
          type: string
        category:
          type: string
        description:
          type: string
        location:
          type: string
        country:
          type: string
        state:
          type: string
        city:
          type: string
        bannerImage:
          type: string
        coverImageUrl:
          type: string
        portfolioImages:
          type: array
          items:
            type: string
      required: [businessName, category, description, location]

    UpdateVendorBody:
      type: object
      properties:
        businessName:
          type: string
        category:
          type: string
        description:
          type: string
        location:
          type: string
        country:
          type: string
        state:
          type: string
        city:
          type: string
        bannerImage:
          type: string
        coverImageUrl:
          type: string
        portfolioImages:
          type: array
          items:
            type: string
        menuUrl:
          type: string

    Event:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        price:
          type: number
        capacity:
          type: integer
        imageUrl:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        vendorName:
          type: string
        galleryImages:
          type: array
          items:
            type: string
        galleryVideos:
          type: array
          items:
            type: string
        createdAt:
          type: string
        type:
          type: string
        priceWomen:
          type: number
        priceMen:
          type: number
        priceCouple:
          type: number
        approvalStatus:
          type: string
        pubEventTypes:
          type: array
          items:
            type: string
        dayPricing:
          type: object
          additionalProperties:
            type: object
            properties:
              women:
                type: number
              men:
                type: number
              couple:
                type: number
        freeEntryRules:
          anyOf:
            - $ref: "#/components/schemas/FreeEntryRules"
            - type: "null"
        hasDrinkPlans:
          type: boolean
        vendorCrowdLevel:
          type: string
          enum: [low, moderate, party]
          nullable: true
      required: [id, vendorId, title, description, category, location, price, capacity, imageUrl, rating, reviewCount, vendorName, galleryImages, galleryVideos, createdAt, type, priceWomen, priceMen, priceCouple, approvalStatus]

    EventDetail:
      allOf:
        - $ref: "#/components/schemas/Event"
        - type: object
          properties:
            vendor:
              $ref: "#/components/schemas/Vendor"
          required: [vendor]

    CreateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        price:
          type: number
        capacity:
          type: integer
        imageUrl:
          type: string
        galleryImages:
          type: array
          items:
            type: string
        galleryVideos:
          type: array
          items:
            type: string
        freeEntryRules:
          $ref: "#/components/schemas/FreeEntryRules"
      required: [title, description, category, location, price, capacity]

    UpdateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        price:
          type: number
        capacity:
          type: integer
        imageUrl:
          type: string
        galleryImages:
          type: array
          items:
            type: string
        galleryVideos:
          type: array
          items:
            type: string
        freeEntryRules:
          anyOf:
            - $ref: "#/components/schemas/FreeEntryRules"
            - type: "null"

    BookingStatus:
      type: string
      enum: [pending, confirmed, cancelled, completed]

    Booking:
      type: object
      properties:
        id:
          type: integer
        eventId:
          type: integer
        userId:
          type: integer
        vendorId:
          type: integer
        bookingDate:
          type: string
        guests:
          type: integer
        totalPrice:
          type: number
        notes:
          type: string
        status:
          $ref: "#/components/schemas/BookingStatus"
        createdAt:
          type: string
        eventTitle:
          type: string
        eventImage:
          type: string
        vendorName:
          type: string
        userName:
          type: string
        userEmail:
          type: string
        rejectionReason:
          type: string
          nullable: true
        phone:
          type: string
        ticketCode:
          type: string
          description: Vendor-specific scannable ticket code (e.g. BLCK-000042-F9)
        pubMode:
          type: string
          description: "Booking mode for pub events: 'ticket' or 'event' (table booking)"
        arrivalTime:
          type: string
          nullable: true
          description: "Expected arrival time for table bookings (HH:MM, 24h format)"
        personName:
          type: string
        checkedIn:
          type: boolean
        checkedInAt:
          type: string
          nullable: true
        finalPrice:
          type: number
        paymentMethod:
          type: string
        ticketWomen:
          type: integer
        ticketMen:
          type: integer
        ticketCouple:
          type: integer
        actualWomen:
          type: integer
          nullable: true
        actualMen:
          type: integer
          nullable: true
        actualCouple:
          type: integer
          nullable: true
        actualGuests:
          type: integer
          nullable: true
        actualAmountDue:
          type: number
          nullable: true
        actualEntry:
          type: object
          nullable: true
          properties:
            women: { type: integer, nullable: true }
            men: { type: integer, nullable: true }
            couple: { type: integer, nullable: true }
            guests: { type: integer, nullable: true }
        freeEntryRules:
          type: object
          nullable: true
          description: "Free-entry-day configuration copied from the event at serialization time, used by clients to hide the Amount Paid block on free-entry-day tickets."
          properties:
            enabled: { type: boolean }
            genders:
              type: array
              items: { type: string }
            days:
              type: array
              items: { type: string }
            beforeTime: { type: string, nullable: true }
      required: [id, eventId, userId, vendorId, bookingDate, guests, totalPrice, notes, status, createdAt, eventTitle, eventImage, vendorName, userName, userEmail, phone]

    CreateBookingBody:
      type: object
      properties:
        eventId:
          type: integer
        bookingDate:
          type: string
        guests:
          type: integer
        notes:
          type: string
        phone:
          type: string
        paymentMethod:
          type: string
          enum: [cod, online]
          description: "cod = pay at venue (skip PhonePe even when configured); online = redirect to PhonePe"
        couponCode:
          type: string
        pointsToUse:
          type: integer
        budgetRange:
          type: string
