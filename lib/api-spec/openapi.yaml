            $ref: "#/components/schemas/CommissionReportBookingLine"
      required: [vendorId, businessName, city, appliedRates, totalBookings, totalRevenue, totalCommission, collectedCommission, pendingCommission, freeEntryCount, freeEntryRevenue, freeEntryCommission, ticketCount, ticketRevenue, ticketCommission, tableCount, tableRevenue, tableCommission, bookings]

