openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Royvento event management platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: storage
  - name: users
  - name: vendors
  - name: events
  - name: bookings
  - name: reviews
  - name: availability
  - name: admin
  - name: wishlist
  - name: users

paths:
  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Invalid request
        '500':
          description: Server error
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current authenticated user
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/me:
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /users/{userId}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"

  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List approved vendors
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: country
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: danceFloor
          in: query
          required: false
          schema:
            type: string
            enum: [dedicated, general, none]
        - name: drinkPlanType
          in: query
          required: false
          schema:
            type: string
            enum: [welcome, unlimited, ticket, custom]
      responses:
        "200":
          description: Vendors list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /vendors/me:
    get:
      operationId: getMyVendor
      tags: [vendors]
      summary: Get the current user's vendor profile
      responses:
        "200":
          description: Vendor profile (or null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyVendorResponse"
    post:
      operationId: createMyVendor
      tags: [vendors]
      summary: Create or apply for a vendor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorBody"
      responses:
        "200":
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    patch:
      operationId: updateMyVendor
      tags: [vendors]
      summary: Update the current vendor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorBody"
      responses:
        "200":
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{vendorId}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get a vendor profile
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/pending:
    get:
      operationId: listPendingVendors
      tags: [vendors]
      summary: List vendors pending approval (admin)
      responses:
        "200":
          description: Pending vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /vendors/{vendorId}/approve:
    post:
      operationId: approveVendor
      tags: [vendors]
      summary: Approve a vendor (admin)
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{vendorId}/reject:
    post:
      operationId: rejectVendor
      tags: [vendors]
      summary: Reject a vendor (admin)
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/drink-offers:
    get:
      operationId: listVendorDrinkOffers
      tags: [vendors]
      summary: List approved vendors that have at least one drink plan
      responses:
        "200":
          description: Vendor drink offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorDrinkOffer"

  /vendors/{vendorId}/drink-plans:
    get:
      operationId: listVendorDrinkPlans
      tags: [vendors]
      summary: Get drink plans for a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Drink plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DrinkPlan"

  /vendors/me/drink-plans:
    post:
      operationId: createDrinkPlan
      tags: [vendors]
      summary: Create a drink plan (vendor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DrinkPlanBody"
      responses:
        "200":
          description: Created drink plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrinkPlan"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /vendors/me/drink-plans/{planId}:
    patch:
      operationId: updateDrinkPlan
      tags: [vendors]
      summary: Update a drink plan (vendor)
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DrinkPlanBody"
      responses:
        "200":
          description: Updated drink plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrinkPlan"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteDrinkPlan
      tags: [vendors]
      summary: Delete a drink plan (vendor)
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events (supports optional pagination via page param)
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: country
          in: query
          required: false
          schema:
            type: string
        - name: minPrice
          in: query
          required: false
          schema:
            type: string
        - name: maxPrice
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: drinkPlanType
          in: query
          required: false
          schema:
            type: string
            enum: [welcome, unlimited, ticket, custom]
      responses:
        "200":
          description: Events list (Event[] when no page param; ListEventsPaginatedResponse when page param provided)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an event (vendor only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/featured:
    get:
      operationId: listFeaturedEvents
      tags: [events]
      summary: Featured events for the homepage
      responses:
        "200":
          description: Featured events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /events/{eventId}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Event details
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event (owning vendor)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventBody"
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"

  /events/vendor/me:
    get:
      operationId: listMyVendorEvents
      tags: [events]
      summary: List events owned by the current vendor
      parameters:
        - name: page
          in: query
          required: false
          description: When provided, returns a paginated response object instead of a plain array
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated events
          content:
            application/json:
              schema:
                type: object
                required: [data, total, page, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  total:
                    type: integer
                  page:
                    type: integer
                  totalPages:
                    type: integer

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/me:
    get:
      operationId: listMyBookings
      tags: [bookings]
      summary: Bookings made by the current user
      responses:
        "200":
          description: Bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/vendor:
    get:
      operationId: listVendorBookings
      tags: [bookings]
      summary: Bookings received by the current vendor
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: from
          in: query
          required: false
          description: Filter bookings on or after this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Paginated bookings
          content:
            application/json:
              schema:
                type: object
                required: [data, total, page, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Booking"
                  total:
                    type: integer
                  page:
                    type: integer
                  totalPages:
                    type: integer

  /bookings/{bookingId}/ticket-code:
    get:
      operationId: getBookingTicketCode
      tags: [bookings]
      summary: Get the vendor-specific ticket code for a booking
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket code
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticketCode:
                    type: string
                required: [ticketCode]

  /bookings/{bookingId}/status:
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update a booking status (vendor)
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingStatusBody"
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List current user's notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "200":
          description: Review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/event/{eventId}:
    get:
      operationId: listEventReviews
      tags: [reviews]
      summary: Reviews for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /reviews/vendor/{vendorId}:
    get:
      operationId: listVendorReviews
      tags: [reviews]
      summary: Reviews for a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /availability/vendor/{vendorId}:
    get:
      operationId: listVendorAvailability
      tags: [availability]
      summary: Availability calendar for a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Availability entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Availability"

  /availability:
    post:
      operationId: setAvailability
      tags: [availability]
      summary: Set availability for the current vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAvailabilityBody"
      responses:
        "200":
          description: Availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Availability"

  /availability/{availabilityId}:
    delete:
      operationId: deleteAvailability
      tags: [availability]
      summary: Remove an availability entry
      parameters:
        - name: availabilityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"

  /partner/commission:
    get:
      operationId: getPartnerCommission
      tags: [bookings]
      summary: Get commission rates configured for the authenticated partner vendor
      responses:
        "200":
          description: Commission rates for this vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerCommissionRates"

  /partner/analytics:
    get:
      operationId: getPartnerAnalytics
      tags: [bookings]
      summary: Revenue and commission analytics for the authenticated partner vendor
      parameters:
        - name: preset
          in: query
          required: false
          schema:
            type: string
            enum: [today, 7d, 30d, 3m, 6m]
        - name: from
          in: query
          required: false
          schema:
            type: string
        - name: to
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Partner analytics result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerAnalyticsResult"

  /partner/scan-ticket:
    post:
      operationId: partnerScanTicket
      tags: [bookings]
      summary: Scan and check in a ticket by booking reference code (partner)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanTicketBody"
      responses:
        "200":
          description: Ticket checked in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanTicketResult"
        "409":
          description: Already checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanTicketResult"

  /partner/checkin-report:
    get:
      operationId: getPartnerCheckinReport
      tags: [bookings]
      summary: Attendance / check-in report for the authenticated vendor
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
        - name: eventId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [all, checkedIn, notArrived]
      responses:
        "200":
          description: Attendance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceReportResponse"

  /partner/crowd-level:
    patch:
      operationId: setPartnerCrowdLevel
      tags: [vendors]
      summary: Set the current crowd level for the authenticated partner venue
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                crowdLevel:
                  type: string
                  enum: [low, moderate, party]
                  nullable: true
              required: [crowdLevel]
      responses:
        "200":
          description: Updated crowd level
          content:
            application/json:
              schema:
                type: object
                properties:
                  crowdLevel:
                    type: string
                    enum: [low, moderate, party]
                    nullable: true
                required: [crowdLevel]
        "400":
          description: Invalid crowd level
        "404":
          description: Vendor profile not found

  /partner/settlement/balance:
    get:
      operationId: getPartnerSettlementBalance
      tags: [bookings]
      summary: Get the current online balance available for settlement
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Available online balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  onlineBalance:
                    type: number
                required: [onlineBalance]
        "404":
          description: Vendor profile not found

  /partner/banking-details:
    get:
      operationId: getPartnerBankingDetails
      tags: [bookings]
      summary: Get banking details for the authenticated partner vendor
      responses:
        "200":
          description: Banking details (or null if not saved yet)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorBankingDetails"
                nullable: true
    put:
      operationId: savePartnerBankingDetails
