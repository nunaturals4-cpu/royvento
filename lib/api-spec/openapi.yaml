          description: Optional per-type actual attendance recorded by the scanner. When provided, updates the booking's actual_* columns and returns the recomputed actualAmountDue.
          properties:
            women:
              type: integer
            men:
              type: integer
            couple:
              type: integer
            guests:
              type: integer
      required: [code]

    ScanTicketBooking:
      type: object
      properties:
        id:
          type: integer
        eventTitle:
          type: string
        vendorName:
          type: string
        bookingDate:
          type: string
        personName:
          type: string
          nullable: true
        userName:
          type: string
        pubMode:
          type: string
        ticketWomen:
          type: integer
        ticketMen:
          type: integer
        ticketCouple:
          type: integer
        guests:
          type: integer
        finalPrice:
          type: number
        commissionRate:
          type: number
          description: Flat fee in INR per unit (per person, per ticket, or per table booking)
        commissionAmount:
          type: number
          description: Platform fee deducted from gross
        netAmount:
          type: number
          description: Net amount the venue should collect
        paymentMethod:
          type: string
        finalPriceBooked:
          type: number
          description: Original booked finalPrice (alias for finalPrice)
        actualWomen:
          type: integer
          nullable: true
        actualMen:
          type: integer
          nullable: true
        actualCouple:
          type: integer
          nullable: true
        actualGuests:
          type: integer
          nullable: true
        actualAmountDue:
          type: number
          nullable: true
          description: Server-computed amount the venue should collect at the door, based on per-type actuals. Null if no actuals recorded yet.
        actualEntry:
          type: object
          nullable: true
          description: Per-type actuals as a single object. Null if none recorded yet.
          properties:
            women:
              type: integer
              nullable: true
            men:
              type: integer
              nullable: true
            couple:
              type: integer
              nullable: true
            guests:
              type: integer
              nullable: true
        priceWomen:
          type: number
          description: Per-woman ticket price for this event (used by client to compute live actual amount).
        priceMen:
          type: number
          description: Per-man ticket price for this event.
        priceCouple:
          type: number
          description: Per-couple ticket price for this event.
      required: [id, eventTitle, vendorName, bookingDate, userName, pubMode, ticketWomen, ticketMen, ticketCouple, guests]

    ScanTicketResult:
      type: object
      properties:
        code:
          type: string
          enum: [OK, ALREADY_CHECKED_IN, NOT_FOUND, INVALID_STATUS]
        message:
          type: string
        checkedInAt:
          type: string
          nullable: true
        booking:
          $ref: "#/components/schemas/ScanTicketBooking"
          nullable: true
      required: [code]

    VendorBankingDetails:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        accountHolderName:
          type: string
        bankName:
          type: string
        accountNumber:
          type: string
        ifscCode:
          type: string
        updatedAt:
          type: string
      required: [id, vendorId, accountHolderName, bankName, accountNumber, ifscCode]

    SaveBankingDetailsBody:
      type: object
      properties:
        accountHolderName:
          type: string
          minLength: 1
        bankName:
          type: string
          minLength: 1
        accountNumber:
          type: string
          minLength: 5
        ifscCode:
          type: string
          pattern: '^[A-Z0-9]{11}$'
      required: [accountHolderName, bankName, accountNumber, ifscCode]

    SettlementRequest:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        amount:
          type: string
          description: Decimal amount as string
        status:
          type: string
          enum: [pending, approved, rejected]
        adminNote:
          type: string
        requestedAt:
          type: string
        processedAt:
          type: string
          nullable: true
      required: [id, vendorId, amount, status, adminNote, requestedAt]

    CreateSettlementRequestBody:
      type: object
      properties:
        amount:
          type: number
          minimum: 0.01
      required: [amount]

    AdminSettlementRequest:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        businessName:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        amount:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        adminNote:
          type: string
        requestedAt:
          type: string
        processedAt:
          type: string
          nullable: true
        bankingDetails:
          $ref: "#/components/schemas/VendorBankingDetails"
          nullable: true
      required: [id, vendorId, amount, status, adminNote, requestedAt]

    RejectSettlementBody:
      type: object
      properties:
        note:
          type: string
